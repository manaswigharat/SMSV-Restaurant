{% extends 'base.html' %}
{% block title %}Admin Login – SMSV Restaurant{% endblock %}

{% block content %}
<section class="page-header page-header-sm">
    <div class="page-header-bg">
        <img src="{{ url_for('static', filename='images/interior.jpg') }}" alt="Interior">
        <div class="page-header-overlay"></div>
    </div>
    <div class="container">
        <h1>Admin <span class="text-gold">Portal</span></h1>
    </div>
</section>

<section class="login-section">
    <div class="container">
        <div class="login-card">
            <div class="login-header">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="SMSV Logo" class="login-logo">
                <h2>Admin Login</h2>
                <p>Enter your credentials to access the dashboard</p>
            </div>
            <form method="POST" action="{{ url_for('admin_login') }}">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user-shield"></i> Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter admin username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="Enter password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="fas fa-eye" id="eye-icon"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-lg btn-block">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            <div class="login-footer">
                <p><i class="fas fa-info-circle"></i> Default: admin / admin123</p>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
    function togglePassword() {
        const pw = document.getElementById('password');
        const eye = document.getElementById('eye-icon');
        if (pw.type === 'password') {
            pw.type = 'text';
            eye.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            pw.type = 'password';
            eye.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
</script>
{% endblock %}
